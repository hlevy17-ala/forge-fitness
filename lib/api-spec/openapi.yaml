    CreateTemplateExercise:
      type: object
      properties:
        exercise:
          type: string
        weightLbs:
          type: number
        reps:
          type: integer
        sets:
          type: integer
        order:
          type: integer
      required:
        - exercise
        - weightLbs
        - reps
        - sets

    CreateTemplateBody:
      type: object
      properties:
        name:
          type: string
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/CreateTemplateExercise"
      required:
        - name
        - exercises

    AuthRequestOtpBody:
